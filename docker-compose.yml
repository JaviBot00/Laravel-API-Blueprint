services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    # Sin volúmenes compartidos: nginx y php-fpm están en el mismo contenedor.
    # El único volumen necesario es el de logs, para persistirlos fuera del contenedor.
    volumes:
      - storage_logs:/var/www/storage/logs
    environment:
      APP_KEY: ${APP_KEY}
    env_file:
      - .env
      - /etc/laravel-api/secrets.env
    ports:
      - "8080:80"
    networks:
      - laravel_net
      - red-compartida
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_api}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    # Puerto 3306 NO expuesto al host: la BD solo es accesible
    # desde la red interna Docker (laravel_net).
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  laravel_net:
    driver: bridge
  red-compartida:
    external: true

volumes:
  db_data:
  storage_logs:
