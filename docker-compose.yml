services:

  # Aplicación PHP / Laravel
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      # Estos volúmenes anónimos "protegen" las carpetas generadas dentro del
      # contenedor para que el bind mount anterior no las sobreescriba.
      # Sin esto, montar "." vaciaría vendor/ y public/ que instaló el Dockerfile.
      - app_vendor:/var/www/vendor
      - app_public:/var/www/public
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    env_file:
      - .env
    networks:
      - laravel_net
    depends_on:
      db:
        condition: service_healthy

  # Servidor web Nginx
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - app_public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_net
      - red-compartida
    depends_on:
      - app

  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_api}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  laravel_net:
    driver: bridge
  red-compartida:
    external: true

volumes:
  db_data:
  app_vendor:
  app_public:
  app_storage:
  app_bootstrap_cache: