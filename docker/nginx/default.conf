server {
    listen 80;
    server_name localhost;
    index index.php index.html;
    root /var/www/public;

    # Pasa al cliente la IP real cuando hay un proxy delante (NPM)
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # IMPORTANTE: primero verificar que el fichero existe.
        # Sin este try_files, si el fichero .php no existe nginx lanza un 404
        # antes de llegar a php-fpm, lo que provoca que TODAS las rutas de
        # Laravel (incluido /api/documentation) devuelvan 404 porque no existe
        # ningún fichero .php con ese nombre — solo existe index.php.
        try_files $uri =404;

        include fastcgi_params;

        # nginx y php-fpm están en el MISMO contenedor (single-container setup
        # con supervisord). En ese caso el fastcgi_pass debe apuntar a
        # 127.0.0.1:9000, no al nombre de otro servicio Docker (laravel_app:9000
        # apunta a sí mismo desde la red externa, lo que falla o genera loops).
        fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}